spring.application.name=PromptHub
# Configuraciµn de la Base de Datos (XAMPP MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/prompt_hub?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciµn de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
groq.api.key=${groq.api.key}
