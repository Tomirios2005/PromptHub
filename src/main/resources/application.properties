spring.application.name=PromptHub

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/prompt_hub?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Groq
groq.api.key=${groq.api.key}

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${google_client}
spring.security.oauth2.client.registration.google.client-secret=${google_secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT
app.jwt-secret=${jwt_token}
app.jwt-expiration=86400000
app.frontend-url=http://localhost:5173